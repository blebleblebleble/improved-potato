<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baobao Meter</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: #232323;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem 1.5rem;
    min-height: 100vh;
  }

  .bm { width: 100%; max-width: 680px; }
  .bm-title { font-size: 22px; font-weight: 600; color: #1B2A41; margin-bottom: 2px; }
  .bm-sub   { font-size: 13px; color: #6B7280; margin-bottom: 1.2rem; }

  .bm-row { display: flex; align-items: center; gap: 20px; }

  .bm-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: #1B2A41; flex-shrink: 0;
    overflow: hidden; cursor: pointer;
    position: relative; transition: background 0.15s;
  }
  .bm-icon:hover { background: #2a3f5a; }
  .bm-icon img {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }
  .bm-placeholder {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex; flex-direction: column;
    align-items: center; gap: 3px; pointer-events: none;
  }
  .bm-placeholder i    { font-size: 22px; color: rgba(255,255,255,0.55); }
  .bm-placeholder span { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.06em; }
  .bm-icon input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }

  .bm-track-wrap { flex: 1; position: relative; height: 64px; display: flex; align-items: center; }
  .bm-track { width: 100%; height: 8px; border-radius: 4px; background: #E5E7EB; position: relative; cursor: pointer; }
  .bm-fill  { position: absolute; left: 0; top: 0; height: 100%; border-radius: 4px; background: #D9A521; pointer-events: none; }
  .bm-dot {
    position: absolute; width: 40px; height: 40px; border-radius: 50%;
    background: #D9A521; top: 50%; transform: translate(-50%, -50%);
    cursor: grab; border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18); z-index: 2; user-select: none;
  }
  .bm-dot:active        { cursor: grabbing; box-shadow: 0 2px 14px rgba(217,165,33,0.45); }
  .bm-dot:focus-visible { outline: none;    box-shadow: 0 0 0 3px rgba(217,165,33,0.45); }

  .bm-pct { text-align: center; margin-top: 0.75rem; font-size: 28px; font-weight: 600; color: #D9A521; letter-spacing: -0.02em; }

  /* bake tool */
  #bakeBtn {
    display: block; margin: 1.5rem auto 0;
    padding: 8px 20px; border-radius: 8px;
    background: #1B2A41; color: #fff;
    border: none; font-size: 13px; cursor: pointer;
  }
  #bakeBtn:hover { background: #2a3f5a; }
  #bakeHint { text-align: center; font-size: 12px; color: #e85; margin-top: 8px; display: none; }
  #bakeOk   { text-align: center; font-size: 12px; color: #2F6690; margin-top: 8px; display: none; }
</style>
</head>

      <input type="file" accept="image/*" id="rightFile" aria-label="Upload right icon">
    </div>
  </div>

  <div class="bm-pct" id="pctDisplay">50%</div>

  <button id="bakeBtn">⚙ Download with icons baked in</button>
  <div id="bakeHint">Upload both icons first, then click the button.</div>
  <div id="bakeOk">✓ File downloaded! Upload it to GitHub as index.html.</div>
</div>

<script>
  function handleUpload(fileInputId, imgId, placeholderId) {
    document.getElementById(fileInputId).addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.getElementById(imgId);
        img.src = e.target.result;
        img.style.display = 'block';
        document.getElementById(placeholderId).style.display = 'none';
      };
      reader.readAsDataURL(file);
    });
  }

  handleUpload('leftFile',  'leftImg',  'leftPlaceholder');
  handleUpload('rightFile', 'rightImg', 'rightPlaceholder');

  // Slider
  const dot = document.getElementById('dot');
  const fill = document.getElementById('fill');
  const track = document.getElementById('track');
  const pctDisplay = document.getElementById('pctDisplay');
  let dragging = false;

  function getPct(clientX) {
    const r = track.getBoundingClientRect();
    return Math.min(100, Math.max(0, Math.round((clientX - r.left) / r.width * 100)));
  }
  function setPos(p) {
    dot.style.left = p + '%';
    fill.style.width = p + '%';
    dot.setAttribute('aria-valuenow', p);
    pctDisplay.textContent = p + '%';
  }

  dot.addEventListener('mousedown', e => { dragging = true; e.preventDefault(); });
  dot.addEventListener('touchstart', e => { dragging = true; e.preventDefault(); }, { passive: false });
  track.addEventListener('mousedown', e => { if (e.target === dot) return; setPos(getPct(e.clientX)); dragging = true; e.preventDefault(); });
  window.addEventListener('mousemove', e => { if (dragging) setPos(getPct(e.clientX)); });
  window.addEventListener('touchmove', e => { if (dragging) setPos(getPct(e.touches[0].clientX)); }, { passive: false });
  window.addEventListener('mouseup',   () => { dragging = false; });
  window.addEventListener('touchend',  () => { dragging = false; });
  dot.addEventListener('keydown', e => {
    const cur = parseInt(dot.style.left);
    if (e.key === 'ArrowRight') { e.preventDefault(); setPos(Math.min(100, cur + 1)); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); setPos(Math.max(0,   cur - 1)); }
  });

  // Bake and download
  document.getElementById('bakeBtn').addEventListener('click', function() {
    const leftSrc  = document.getElementById('leftImg').src;
    const rightSrc = document.getElementById('rightImg').src;

    if (!leftSrc || !leftSrc.startsWith('data:') || !rightSrc || !rightSrc.startsWith('data:')) {
      document.getElementById('bakeHint').style.display = 'block';
      document.getElementById('bakeOk').style.display = 'none';
      return;
    }

    // Get the current page HTML and swap in the baked images
    const html = document.documentElement.outerHTML;
    const baked = html
      .replace(/<img id="leftImg"[^>]*>/, `<img id="leftImg" src="${leftSrc}" style="display:block" alt="left icon" />`)
      .replace(/<img id="rightImg"[^>]*>/, `<img id="rightImg" src="${rightSrc}" style="display:block" alt="right icon" />`);

    const blob = new Blob([baked], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    a.click();

    document.getElementById('bakeHint').style.display = 'none';
    document.getElementById('bakeOk').style.display = 'block';
  });
</script>
